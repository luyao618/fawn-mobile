appId: com.luyao618.formobile
---
- extendedWaitUntil:
    visible: "照护空间尚未设置"
    timeout: 120000
- tapOn: "我的"
- extendedWaitUntil:
    visible: "宝宝资料"
    timeout: 120000
- tapOn: "^可暂不填$"
- inputText: "G031LeapBaby"
- assertVisible: "G031LeapBaby"
- hideKeyboard
- tapOn: "^例如 2024-02-29$"
- inputText: "2024-02-29"
- hideKeyboard
- assertVisible: "2024-02-29"
- tapOn: "性别女孩"
- assertVisible:
    text: "性别女孩"
    checked: true
- scrollUntilVisible:
    element:
      text: "^100–10000$"
    direction: DOWN
- tapOn: "^100–10000$"
- inputText: "3200"
- hideKeyboard
- assertVisible: "3200"
- scrollUntilVisible:
    element:
      text: "^10–100$"
    direction: DOWN
- tapOn: "^10–100$"
- inputText: "50.5"
- hideKeyboard
- assertVisible: "50.5"
- scrollUntilVisible:
    element:
      text: "^10–80$"
    direction: DOWN
- tapOn: "^10–80$"
- inputText: "34.2"
- hideKeyboard
- assertVisible: "34.2"
- scrollUntilVisible:
    element:
      text: "早产"
    direction: DOWN
- tapOn: "早产"
- assertVisible:
    text: "早产"
    checked: true
- scrollUntilVisible:
    element:
      text: "^20–45，可暂不填$"
    direction: DOWN
- tapOn: "^20–45，可暂不填$"
- inputText: "36"
- hideKeyboard
- assertVisible: "36"
- scrollUntilVisible:
    element:
      text: "保存宝宝资料"
    direction: DOWN
- tapOn: "保存宝宝资料"
- extendedWaitUntil:
    visible: "宝宝资料已保存"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "G031LeapBaby"
    direction: UP
- assertVisible: "G031LeapBaby"
- assertVisible: "${AGE_DISPLAY}"
